<!doctype html>
<html lang="de-CH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbfaf6" />
    <meta name="description" content="Gewichtete Noten auf der Schweizer Skala von 1 bis 6 berechnen." />

    <title>Notenrechner – misterpfister.net</title>

    <link rel="canonical" href="https://misterpfister.net/sechserrechner/" />
    <link rel="icon" href="../assets/favicon.svg?v=4e8e133" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/site.css?v=4e8e133" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Rechner springen</a>

    <header class="tool-header">
      <div class="tool-nav-inner">
        <a class="back-link" href="../">← misterpfister.net</a>
      </div>
    </header>

    <main id="main" class="tool-main">
      <header class="tool-heading">
        <h1>Notenrechner</h1>
        <p>Gewichteten Durchschnitt auf der Schweizer Skala von 1 bis 6 berechnen.</p>
      </header>

      <section class="tool-surface" aria-label="Noten berechnen">
        <form id="gradeForm" novalidate>
          <div class="grade-column-heads" aria-hidden="true">
            <span>Note</span>
            <span>Gewicht</span>
            <span></span>
          </div>
          <div id="entries" class="grade-rows"></div>

          <p class="form-hint">Gewicht: 1 = normal, 2 = doppelt.</p>

          <div class="form-actions">
            <button id="addBtn" class="button button--secondary" type="button">+ Note hinzufügen</button>
            <button id="resetBtn" class="button button--text" type="button">Zurücksetzen</button>
          </div>

          <p id="message" class="message" role="status" aria-live="polite"></p>

          <section id="resultArea" class="inline-result" aria-label="Berechnungsergebnis" aria-live="polite" hidden>
            <div class="result-line">
              <output id="average" class="result-value"></output>
              <span id="passStatus" class="result-status"></span>
            </div>
            <p id="resultLabel" class="result-summary"></p>
          </section>

          <details class="planner">
            <summary>Welche Note brauche ich als Nächstes?</summary>
            <div class="planner-grid">
              <label>
                <span class="form-label">Zielschnitt</span>
                <input id="targetAverage" class="form-control" type="number" min="1" max="6" step="0.01" value="4" inputmode="decimal" />
              </label>
              <label>
                <span class="form-label">Nächstes Gewicht</span>
                <input id="nextWeight" class="form-control" type="number" min="0.01" max="100" step="0.01" value="1" inputmode="decimal" />
              </label>
            </div>
            <output id="planningResult" class="planner-output" aria-live="polite">Zuerst mindestens eine Note eingeben.</output>
          </details>
        </form>
      </section>
    </main>

    <script>
      const entriesEl = document.getElementById('entries');
      const messageEl = document.getElementById('message');
      const resultAreaEl = document.getElementById('resultArea');
      const averageEl = document.getElementById('average');
      const resultLabelEl = document.getElementById('resultLabel');
      const passStatusEl = document.getElementById('passStatus');
      const targetAverageEl = document.getElementById('targetAverage');
      const nextWeightEl = document.getElementById('nextWeight');
      const planningResultEl = document.getElementById('planningResult');

      let nextEntryId = 1;
      let currentState = null;

      function hasHundredthPrecision(value) {
        return Math.abs(value * 100 - Math.round(value * 100)) < 0.0000001;
      }

      function roundToHundredth(value) {
        return Math.round((value + 0.0000000001) * 100) / 100;
      }

      function addEntry(values = {}, shouldFocus = false) {
        const id = nextEntryId++;
        const row = document.createElement('div');
        row.className = 'grade-row';
        row.innerHTML = `
          <label>
            <span class="sr-only">Note ${id}</span>
            <input class="form-control grade-input" type="number" min="1" max="6" step="0.01" inputmode="decimal" placeholder="z. B. 5.25" value="${values.grade ?? ''}" />
          </label>
          <label>
            <span class="sr-only">Gewicht der Note ${id}</span>
            <input class="form-control weight-input" type="number" min="0.01" max="100" step="0.01" inputmode="decimal" value="${values.weight ?? '1'}" />
          </label>
          <button class="icon-button remove-button" type="button" aria-label="Notenzeile ${id} entfernen" title="Zeile entfernen">×</button>
        `;

        row.querySelectorAll('input').forEach((input) => {
          input.addEventListener('input', calculateGrades);
        });

        row.querySelector('.remove-button').addEventListener('click', () => {
          const focusRow = row.nextElementSibling || row.previousElementSibling;
          row.remove();
          if (!entriesEl.children.length) {
            addEntry({}, true);
            return;
          }
          calculateGrades();
          focusRow.querySelector('.grade-input').focus();
        });

        entriesEl.appendChild(row);
        calculateGrades();
        if (shouldFocus) row.querySelector('.grade-input').focus();
        return row;
      }

      function clearResult() {
        currentState = null;
        resultAreaEl.hidden = true;
        averageEl.textContent = '';
        resultLabelEl.textContent = '';
        passStatusEl.textContent = '';
        passStatusEl.removeAttribute('data-tone');
        updatePlanner();
      }

      function setError(text) {
        messageEl.textContent = text;
        clearResult();
      }

      function calculateGrades() {
        const rows = Array.from(entriesEl.querySelectorAll('.grade-row'));
        let weightedSum = 0;
        let totalWeight = 0;
        let count = 0;

        messageEl.textContent = '';

        for (const row of rows) {
          const gradeInput = row.querySelector('.grade-input');
          const weightInput = row.querySelector('.weight-input');
          const gradeText = gradeInput.value.trim();
          const weightText = weightInput.value.trim();

          if (!gradeText) continue;

          const grade = Number(gradeText);
          const weight = Number(weightText);

          if (!Number.isFinite(grade) || grade < 1 || grade > 6 || !hasHundredthPrecision(grade)) {
            setError('Noten müssen zwischen 1.00 und 6.00 liegen und dürfen höchstens zwei Dezimalstellen haben.');
            return;
          }

          if (!weightText || !Number.isFinite(weight) || weight < 0.01 || weight > 100 || !hasHundredthPrecision(weight)) {
            setError('Gewichte müssen zwischen 0.01 und 100 liegen und dürfen höchstens zwei Dezimalstellen haben.');
            return;
          }

          weightedSum += grade * weight;
          totalWeight += weight;
          count += 1;
        }

        if (!count) {
          clearResult();
          return;
        }

        const average = weightedSum / totalWeight;
        const roundedAverage = roundToHundredth(average);
        const passed = roundedAverage >= 4;
        const formattedWeight = new Intl.NumberFormat('de-CH', { maximumFractionDigits: 2 }).format(totalWeight);

        currentState = { weightedSum, totalWeight, count, average };
        resultAreaEl.hidden = false;
        averageEl.textContent = roundedAverage.toFixed(2);
        passStatusEl.textContent = passed ? 'Bestanden' : 'Noch nicht bestanden';
        passStatusEl.dataset.tone = passed ? 'success' : 'danger';
        resultLabelEl.textContent = `${count} ${count === 1 ? 'Note' : 'Noten'} · Gesamtgewicht ${formattedWeight}`;
        updatePlanner();
      }

      function updatePlanner() {
        planningResultEl.removeAttribute('data-tone');

        if (!currentState) {
          planningResultEl.textContent = 'Zuerst mindestens eine Note eingeben.';
          return;
        }

        const target = Number(targetAverageEl.value);
        const nextWeight = Number(nextWeightEl.value);

        if (!Number.isFinite(target) || target < 1 || target > 6 || !hasHundredthPrecision(target)
          || !Number.isFinite(nextWeight) || nextWeight < 0.01 || nextWeight > 100 || !hasHundredthPrecision(nextWeight)) {
          planningResultEl.textContent = 'Zielschnitt und Gewicht müssen gültig sein und dürfen höchstens zwei Dezimalstellen haben.';
          planningResultEl.dataset.tone = 'danger';
          return;
        }

        const required = (target * (currentState.totalWeight + nextWeight) - currentState.weightedSum) / nextWeight;
        const requiredToHundredth = Math.ceil((required - 0.0000000001) * 100) / 100;

        if (required <= 1) {
          planningResultEl.textContent = `Ziel ${target.toFixed(2)} ist bereits gesichert — auch mit einer 1.00.`;
          planningResultEl.dataset.tone = 'success';
        } else if (requiredToHundredth > 6) {
          planningResultEl.textContent = `Nicht erreichbar: Benötigt würde eine ${requiredToHundredth.toFixed(2)}.`;
          planningResultEl.dataset.tone = 'danger';
        } else {
          planningResultEl.textContent = `Benötigte nächste Note: ${requiredToHundredth.toFixed(2)}.`;
          planningResultEl.dataset.tone = 'success';
        }
      }

      function resetCalculator() {
        entriesEl.replaceChildren();
        nextEntryId = 1;
        targetAverageEl.value = '4';
        nextWeightEl.value = '1';
        addEntry();
        addEntry();
        messageEl.textContent = '';
        clearResult();
      }

      document.getElementById('addBtn').addEventListener('click', () => addEntry({}, true));
      document.getElementById('resetBtn').addEventListener('click', resetCalculator);
      targetAverageEl.addEventListener('input', updatePlanner);
      nextWeightEl.addEventListener('input', updatePlanner);

      resetCalculator();
    </script>
  </body>
</html>
