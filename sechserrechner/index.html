<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notendurchschnitt Rechner</title>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      --color-text-primary: #f8f9fa;
      --color-text-secondary: #adb5bd;
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --card-shadow: rgba(0, 0, 0, 0.5);
      --accent: #4dabf7;
      --error: #ff6b6b;
      --success: #51cf66;
      --focus-ring: rgba(77, 171, 247, 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100vh;
      background: var(--bg-primary);
      font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%; max-width: 600px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px var(--card-shadow), 0 2px 4px -2px var(--card-shadow);
      padding: 2.5rem 2rem;
    }
    h1 {
      margin: 0 0 2rem 0;
      font-size: 2rem;
      text-align: center;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.025em;
    }
    .entries {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
    }
    .entry {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.5rem;
      align-items: center;
    }
    .entry input[type="number"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--bg-secondary);
      color: var(--color-text-primary);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .entry input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .entry button {
      background: var(--error);
      border: none;
      color: var(--color-text-primary);
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.25rem;
      line-height: 1;
    }
    .entry button:hover {
      background: #ff5252;
      transform: scale(1.05);
    }
    .actions {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .actions button {
      flex: 1;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #addBtn {
      background: var(--accent);
      color: var(--bg-primary);
    }
    #addBtn:hover {
      background: #3a9ce5;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(77, 171, 247, 0.3);
    }
    #calcBtn {
      background: var(--success);
      color: var(--bg-primary);
    }
    #calcBtn:hover {
      background: #40c653;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(81, 207, 102, 0.3);
    }
    #message {
      text-align: center;
      font-size: 0.875rem;
      min-height: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--color-text-secondary);
    }
    #result {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text-primary);
      transition: color 0.3s;
    }
    #result.grade-excellent { color: #51cf66; }
    #result.grade-good { color: #4dabf7; }
    #result.grade-average { color: #ffd43b; }
    #result.grade-poor { color: #ff8787; }
    #result.grade-fail { color: #ff6b6b; }

    /* Mobile adjustments */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
        align-items: flex-start;
      }
      .container {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
      }
      .entry {
        grid-template-columns: 1fr auto;
      }
      .entry input[type="number"]:nth-child(1),
      .entry input[type="number"]:nth-child(2) {
        grid-column: 1 / -1;
      }
    }

  </style>
</head>
<body>
  <div class="container" role="main">
    <h1>Notendurchschnitt Rechner</h1>
    <div id="message"></div>
    <div class="entries" id="entries"></div>
    <div class="actions">
      <button id="addBtn">+ Note hinzufügen</button>
      <button id="calcBtn">Durchschnitt berechnen</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const entriesEl = document.getElementById('entries');
    const messageEl = document.getElementById('message');
    const resultEl = document.getElementById('result');
    document.getElementById('addBtn').addEventListener('click', addEntry);
    document.getElementById('calcBtn').addEventListener('click', calculate);

    // Start with two entries
    addEntry(); addEntry();

    function addEntry() {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `
        <input type="number" placeholder="Note (z.B. 5.5)" min="0" max="6" step="0.01" class="grade-input" />
        <input type="number" placeholder="Gewicht (z.B. 50)" min="0" max="100" step="0.01" class="weight-input" />
        <button aria-label="Eintrag entfernen">×</button>
      `;
      const removeBtn = div.querySelector('button');
      removeBtn.addEventListener('click', () => { div.remove(); updateMessage(); autoCalculate(); });

      // Auto-calculate on input
      div.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', autoCalculate);
      });

      entriesEl.appendChild(div);
      updateMessage();
    }

    function updateMessage() {
      const count = entriesEl.children.length;
      messageEl.textContent = `${count} ${count === 1 ? 'Eintrag' : 'Einträge'}`;
      resultEl.textContent = '';
    }

    function calculate() {
      const entryEls = Array.from(entriesEl.children);
      let totalWeight = 0, sum = 0;
      for (const el of entryEls) {
        const [gradeInput, weightInput] = el.querySelectorAll('input');
        const grade = parseFloat(gradeInput.value);
        const weight = parseFloat(weightInput.value);
        if (isNaN(grade) || grade < 0 || grade > 6) {
          showMessage('Ungültige Note! Bitte 0–6 eingeben.', true);
          return;
        }
        if (isNaN(weight) || weight <= 0) {
          showMessage('Ungültige Gewichtung! Bitte >0.', true);
          return;
        }
        sum += grade * weight;
        totalWeight += weight;
      }
      if (totalWeight === 0) {
        showMessage('Gesamtgewicht darf nicht 0 sein.', true);
        return;
      }
      const avg = (sum / totalWeight).toFixed(2);
      const percentage = ((avg / 6) * 100).toFixed(0);

      // Apply color class based on grade
      resultEl.className = '';
      if (avg >= 5.5) resultEl.classList.add('grade-excellent');
      else if (avg >= 5.0) resultEl.classList.add('grade-good');
      else if (avg >= 4.0) resultEl.classList.add('grade-average');
      else if (avg >= 3.0) resultEl.classList.add('grade-poor');
      else resultEl.classList.add('grade-fail');

      resultEl.textContent = `Durchschnitt: ${avg} (${percentage}%)`;
      showMessage('', false);
    }

    function autoCalculate() {
      const entryEls = Array.from(entriesEl.children);
      let allFilled = true;
      for (const el of entryEls) {
        const [gradeInput, weightInput] = el.querySelectorAll('input');
        if (!gradeInput.value || !weightInput.value) {
          allFilled = false;
          break;
        }
      }
      if (allFilled && entryEls.length > 0) {
        calculate();
      }
    }

    function showMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.style.color = isError ? 'var(--error)' : '#fff';
    }

    // Enter key triggers calculation
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        calculate();
      }
    });
  </script>
</body>
</html>
