<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schlafrechner – misterpfister.net</title>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      --color-text-primary: #f8f9fa;
      --color-text-secondary: #adb5bd;
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --card-shadow: rgba(0, 0, 0, 0.5);
      --accent: #4dabf7;
      --error: #ff6b6b;
      --success: #51cf66;
      --focus-ring: rgba(77, 171, 247, 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100vh;
      background: var(--bg-primary);
      font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%; max-width: 600px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px var(--card-shadow), 0 2px 4px -2px var(--card-shadow);
      padding: 2.5rem 2rem;
    }
    h1 {
      font-size: 2rem;
      text-align: center;
      margin: 0 0 2rem 0;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.025em;
    }
    .field {
      margin-top: 1.5rem;
    }
    .field label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--color-text-secondary);
      font-size: 0.875rem;
    }
    .field input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      outline: none;
      background: var(--bg-secondary);
      color: var(--color-text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .preset-btn {
      flex: 1;
      padding: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      color: var(--color-text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:hover, .preset-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }
    #calculateBtn, #sleepNowBtn {
      flex: 1;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #calculateBtn {
      background: var(--accent);
      color: var(--bg-primary);
    }
    #calculateBtn:hover {
      background: #3a9ce5;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(77, 171, 247, 0.3);
    }
    #sleepNowBtn {
      background: var(--success);
      color: var(--bg-primary);
    }
    #sleepNowBtn:hover {
      background: #40c653;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(81, 207, 102, 0.3);
    }
    #message {
      margin-top: 1rem;
      font-size: 0.875rem;
      min-height: 1.2rem;
      color: var(--error);
      text-align: center;
    }
    #result {
      margin-top: 0.75rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--success);
      text-align: center;
    }
    #cycleInfo {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      text-align: center;
      font-style: italic;
    }
    @media (max-width: 640px) {
      body {
        padding: 1rem;
        align-items: flex-start;
      }
      .container {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <h1>Schlafrechner</h1>
    <div class="field">
      <label for="wakeTime">Aufwachzeit</label>
      <input type="time" id="wakeTime" required />
    </div>
    <div class="field">
      <label for="sleepHours">Schlafdauer (Std.)</label>
      <input type="number" id="sleepHours" min="1" max="24" step="0.5" value="8" required />
      <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
        <button class="preset-btn" data-hours="7">7h</button>
        <button class="preset-btn" data-hours="8">8h</button>
        <button class="preset-btn" data-hours="9">9h</button>
      </div>
    </div>
    <div class="actions">
      <button id="calculateBtn">Berechnen</button>
      <button id="sleepNowBtn">Jetzt schlafen</button>
    </div>
    <div id="message" aria-live="assertive"></div>
    <div id="result" aria-live="polite"></div>
    <div id="cycleInfo" aria-live="polite"></div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const wake = new Date(now.getTime() + 8*60*60*1000);
      document.getElementById('wakeTime').value = wake.toTimeString().slice(0,5);
    });

    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('sleepHours').value = btn.dataset.hours;
      });
    });

    // Calculate bedtime
    document.getElementById('calculateBtn').addEventListener('click', () => {
      const msg = document.getElementById('message');
      const res = document.getElementById('result');
      const cycleInfo = document.getElementById('cycleInfo');
      msg.textContent = '';
      res.textContent = '';
      cycleInfo.textContent = '';

      const wakeVal = document.getElementById('wakeTime').value;
      const sleepVal = parseFloat(document.getElementById('sleepHours').value);

      if (!wakeVal || isNaN(sleepVal) || sleepVal<=0) {
        msg.textContent = 'Bitte gültige Werte eingeben.';
        return;
      }

      const [h,m] = wakeVal.split(':').map(Number);
      let total = h*60 + m - (sleepVal*60 + 10);
      if (total<0) total += 1440;
      const bh = String(Math.floor(total/60)).padStart(2,'0');
      const bm = String(total%60).padStart(2,'0');
      res.textContent = `Schlafenszeit: ${bh}:${bm} Uhr`;

      // Calculate sleep cycles (1 cycle = 90 min)
      const cycles = Math.round(sleepVal * 60 / 90);
      cycleInfo.textContent = `≈ ${cycles} Schlafzyklen (à 90 Min)`;
    });

    // Sleep now button
    document.getElementById('sleepNowBtn').addEventListener('click', () => {
      const msg = document.getElementById('message');
      const res = document.getElementById('result');
      const cycleInfo = document.getElementById('cycleInfo');
      msg.textContent = '';
      res.textContent = '';
      cycleInfo.textContent = '';

      const sleepVal = parseFloat(document.getElementById('sleepHours').value);

      if (isNaN(sleepVal) || sleepVal<=0) {
        msg.textContent = 'Bitte gültige Schlafdauer eingeben.';
        return;
      }

      const now = new Date();
      const wakeTime = new Date(now.getTime() + (sleepVal * 60 + 10) * 60 * 1000);
      const wh = String(wakeTime.getHours()).padStart(2,'0');
      const wm = String(wakeTime.getMinutes()).padStart(2,'0');

      res.textContent = `Aufwachzeit: ${wh}:${wm} Uhr`;

      const cycles = Math.round(sleepVal * 60 / 90);
      cycleInfo.textContent = `≈ ${cycles} Schlafzyklen (à 90 Min)`;
    });

    document.addEventListener('keydown', e => {
      if (e.key==='Enter') {
        e.preventDefault();
        document.getElementById('calculateBtn').click();
      }
    });
  </script>
</body>
</html>
