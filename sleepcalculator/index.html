<!doctype html>
<html lang="de-CH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1110" />
    <meta name="description" content="Schlafens- oder Aufwachzeit aus Schlafdauer und Einschlafzeit berechnen." />

    <title>Schlafrechner – misterpfister.net</title>

    <link rel="canonical" href="https://misterpfister.net/sleepcalculator/" />
    <link rel="icon" href="../assets/favicon.svg?v=4e8e133" type="image/svg+xml" />
    <script src="../assets/theme.js?v=night-ledger-2"></script>
    <link rel="stylesheet" href="../assets/site.css?v=night-ledger-4" />
  </head>
  <body class="tool-page">
    <a class="skip-link" href="#main">Zum Rechner springen</a>

    <header class="tool-header">
      <div class="tool-nav-inner">
        <a class="back-link" href="../">← misterpfister.net</a>
        <button class="theme-toggle" type="button" data-theme-toggle>
          <span data-theme-label>Hell</span>
        </button>
      </div>
    </header>

    <main id="main" class="tool-main">
      <header class="tool-heading">
        <p class="tool-label">Werkzeug</p>
        <h1>Schlafrechner</h1>
        <p>Schlafens- oder Aufwachzeit mit eigener Schlaf- und Einschlafdauer berechnen.</p>
      </header>

      <section class="tool-surface" aria-label="Schlafzeit berechnen">
        <form id="sleepForm" novalidate>
          <fieldset class="mode-list">
            <legend class="sr-only">Berechnungsmodus</legend>
            <label class="mode-choice">
              <input type="radio" name="mode" value="bedtime" checked />
              <span>Ich möchte um eine bestimmte Zeit aufstehen</span>
            </label>
            <label class="mode-choice">
              <input type="radio" name="mode" value="now" />
              <span>Ich gehe jetzt schlafen</span>
            </label>
          </fieldset>

          <div class="sleep-fields">
            <div id="wakeField" class="field-row">
              <label class="form-label" for="wakeTime">Aufwachzeit</label>
              <input id="wakeTime" class="form-control" type="time" value="07:00" required />
            </div>

            <div class="field-row">
              <label class="form-label" for="sleepHours">Schlafdauer in Stunden</label>
              <input id="sleepHours" class="form-control" type="number" min="1" max="16" step="0.5" value="8" inputmode="decimal" required />
            </div>

            <div class="field-row">
              <label class="form-label" for="fallAsleepMinutes">Einschlafzeit in Minuten</label>
              <input id="fallAsleepMinutes" class="form-control" type="number" min="0" max="180" step="1" value="15" inputmode="numeric" enterkeyhint="done" required />
            </div>
          </div>

          <div class="submit-row">
            <button id="calculateBtn" class="button" type="submit">Schlafenszeit berechnen</button>
          </div>
          <p id="message" class="message" role="status" aria-live="polite"></p>
        </form>

        <section id="sleepResult" class="inline-result" aria-label="Berechnungsergebnis" aria-live="polite" hidden>
          <p id="resultTitle" class="result-caption"></p>
          <output id="resultTime" class="result-time"></output>
          <p id="resultLabel" class="result-summary"></p>
        </section>
      </section>

      <p class="disclaimer">Nur eine Planungshilfe; Schlafbedarf ist individuell.</p>
    </main>

    <script>
      const form = document.getElementById('sleepForm');
      const wakeField = document.getElementById('wakeField');
      const wakeTimeEl = document.getElementById('wakeTime');
      const sleepHoursEl = document.getElementById('sleepHours');
      const fallAsleepMinutesEl = document.getElementById('fallAsleepMinutes');
      const calculateBtn = document.getElementById('calculateBtn');
      const messageEl = document.getElementById('message');
      const sleepResultEl = document.getElementById('sleepResult');
      const resultTitleEl = document.getElementById('resultTitle');
      const resultTimeEl = document.getElementById('resultTime');
      const resultLabelEl = document.getElementById('resultLabel');

      function selectedMode() {
        return document.querySelector('input[name="mode"]:checked').value;
      }

      function formatClock(totalMinutes) {
        const normalized = ((totalMinutes % 1440) + 1440) % 1440;
        const hours = String(Math.floor(normalized / 60)).padStart(2, '0');
        const minutes = String(normalized % 60).padStart(2, '0');
        return `${hours}:${minutes}`;
      }

      function formatDuration(hours) {
        const wholeHours = Math.floor(hours);
        const minutes = Math.round((hours - wholeHours) * 60);
        return minutes ? `${wholeHours} h ${minutes} min` : `${wholeHours} h`;
      }

      function sameLocalDate(first, second) {
        return first.getFullYear() === second.getFullYear()
          && first.getMonth() === second.getMonth()
          && first.getDate() === second.getDate();
      }

      function clearResult() {
        messageEl.textContent = '';
        sleepResultEl.hidden = true;
        resultTitleEl.textContent = '';
        resultTimeEl.textContent = '';
        resultLabelEl.textContent = '';
      }

      function setError(text) {
        clearResult();
        messageEl.textContent = text;
      }

      function updateMode() {
        const mode = selectedMode();
        wakeField.hidden = mode === 'now';
        calculateBtn.textContent = mode === 'now' ? 'Aufwachzeit berechnen' : 'Schlafenszeit berechnen';
        clearResult();
      }

      function calculateTime() {
        const mode = selectedMode();
        const duration = Number(sleepHoursEl.value);
        const latency = Number(fallAsleepMinutesEl.value);

        if (!Number.isFinite(duration) || duration < 1 || duration > 16 || Math.abs(duration * 2 - Math.round(duration * 2)) > 0.000001) {
          setError('Schlafdauer: 1 bis 16 Stunden in Schritten von 30 Minuten.');
          return;
        }

        if (!Number.isInteger(latency) || latency < 0 || latency > 180) {
          setError('Einschlafzeit: 0 bis 180 Minuten in ganzen Minuten.');
          return;
        }

        messageEl.textContent = '';
        const durationMinutes = Math.round(duration * 60);
        const durationLabel = formatDuration(duration);

        if (mode === 'bedtime') {
          const wakeValue = wakeTimeEl.value;
          if (!/^\d{2}:\d{2}$/.test(wakeValue)) {
            setError('Bitte eine gültige Aufwachzeit eingeben.');
            return;
          }

          const [wakeHours, wakeMinutesPart] = wakeValue.split(':').map(Number);
          if (!Number.isInteger(wakeHours) || !Number.isInteger(wakeMinutesPart) || wakeHours < 0 || wakeHours > 23 || wakeMinutesPart < 0 || wakeMinutesPart > 59) {
            setError('Bitte eine gültige Aufwachzeit eingeben.');
            return;
          }

          const wakeMinutes = wakeHours * 60 + wakeMinutesPart;
          const rawBedtime = wakeMinutes - durationMinutes - latency;
          const dayLabel = rawBedtime < 0 ? 'Am Vorabend' : 'Am selben Tag';

          resultTitleEl.textContent = 'Schlafenszeit';
          resultTimeEl.textContent = formatClock(rawBedtime);
          resultLabelEl.textContent = `${dayLabel} · ${durationLabel} Schlaf + ${latency} min Einschlafzeit`;
        } else {
          const now = new Date();
          const wakeDate = new Date(now.getTime() + (durationMinutes + latency) * 60 * 1000);
          const wakeMinutes = wakeDate.getHours() * 60 + wakeDate.getMinutes();
          const dayLabel = sameLocalDate(now, wakeDate) ? 'Heute' : 'Morgen';

          resultTitleEl.textContent = 'Aufwachzeit';
          resultTimeEl.textContent = formatClock(wakeMinutes);
          resultLabelEl.textContent = `${dayLabel} · ${durationLabel} Schlaf + ${latency} min Einschlafzeit`;
        }

        sleepResultEl.hidden = false;
      }

      document.querySelectorAll('input[name="mode"]').forEach((input) => {
        input.addEventListener('change', updateMode);
      });

      sleepHoursEl.addEventListener('input', clearResult);
      wakeTimeEl.addEventListener('input', clearResult);
      fallAsleepMinutesEl.addEventListener('input', clearResult);
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        calculateTime();
      });

      updateMode();
    </script>
  </body>
</html>
