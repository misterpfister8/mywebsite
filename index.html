<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Willkommen – misterpfister.net</title>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      --color-text-primary: #f8f9fa;
      --color-text-secondary: #adb5bd;
      --color-accent: #7c3aed;
      --color-accent-hover: #8b5cf6;
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --card-shadow: rgba(0, 0, 0, 0.5);
      --focus-ring: rgba(124, 58, 237, 0.5);
      --link-hover-bg: #334155;
    }
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: var(--bg-primary);
      padding: 2rem 1rem;
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding: 3rem 2.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px var(--card-shadow), 0 2px 4px -2px var(--card-shadow);
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 0.75rem 0;
      letter-spacing: -0.025em;
    }
    .subtitle {
      font-size: 1.125rem;
      color: var(--color-text-secondary);
      margin: 0 0 2rem 0;
      font-weight: 400;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .link {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
      border-radius: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      color: var(--color-text-primary);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .link-icon {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .link-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: var(--color-text-primary);
    }
    .link-description {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }
    .link:hover {
      background: var(--link-hover-bg);
      border-color: var(--color-accent);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.15), 0 0 0 1px var(--color-accent);
    }
    .link:hover .link-icon {
      transform: scale(1.1);
      opacity: 1;
    }
    .link:focus {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }

    footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
      text-align: center;
    }
    #clock {
      display: inline-block;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      opacity: 0.7;
    }

    /* Mobile Anpassung */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
        align-items: flex-start;
      }
      .card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .links {
        grid-template-columns: 1fr;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>Willkommen auf meiner Webseite</h1>
    <p class="subtitle">Startseite für all meine Projekte</p>

    <div class="links">
      <a href="https://misterpfister.net/sechserrechner/" class="link">
        <div class="link-icon">📊</div>
        <div class="link-title">Sechserrechner</div>
        <div class="link-description">Notendurchschnitt berechnen</div>
      </a>
      <a href="https://misterpfister.net/sleepcalculator/" class="link">
        <div class="link-icon">😴</div>
        <div class="link-title">Sleep Calculator</div>
        <div class="link-description">Optimale Schlafenszeit ermitteln</div>
      </a>
      <a href="https://mealie.misterpfister.net" class="link">
        <div class="link-icon">🍳</div>
        <div class="link-title">Mealie</div>
        <div class="link-description">Rezeptverwaltung & Meal Planning</div>
      </a>
      <a href="https://github.com/misterpfister8/spasstocsv" class="link">
        <div class="link-icon">🔄</div>
        <div class="link-title">SpasstoCSV</div>
        <div class="link-description">Daten-Konverter für SPASS-Format</div>
      </a>
    </div>

    <footer>
      <div id="clock" aria-live="off"></div>
    </footer>
  </div>
  <script>
    function updateClock() {
      const now = new Date();
      const opts = {
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
      };
      document.getElementById('clock').textContent =
        now.toLocaleDateString('de-CH', opts);
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
